services:
  postgres:
    image: postgres:16
    container_name: threatlens_postgres
    restart: always
    environment:
      POSTGRES_DB: threatlens
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d threatlens"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: threatlens_backend
    restart: always
    environment:
      APP_NAME: ${APP_NAME:-ThreatLens AI}
      DEBUG: ${DEBUG:-True}
      SQLALCHEMY_ECHO: "False"

      DATABASE_URL: ${DATABASE_URL:-postgresql://postgres:postgres@postgres:5432/threatlens}
      TEST_DATABASE_URL: postgresql://postgres:postgres@postgres:5432/threatlens_test

      DB_HOST: ${DB_HOST:-postgres}
      DB_PORT: ${DB_PORT:-5432}
      DB_NAME: ${DB_NAME:-threatlens}
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-postgres}

      SECRET_KEY: ${SECRET_KEY:-change-this-secret-key-in-production}
      ALGORITHM: ${ALGORITHM:-HS256}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-60}

      ALERT_EXPLANATION_PROVIDER: ${ALERT_EXPLANATION_PROVIDER:-rule_based}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_ALERT_MODEL: ${OPENAI_ALERT_MODEL:-gpt-4o-mini}

      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@example.com}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-admin123}
    ports:
      - "8000:8000"
    volumes:
      - ./backend/ml/models:/app/ml/models
      - ./backend/ml/model_archives:/app/ml/model_archives:ro 
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: threatlens_frontend
    restart: always
    environment:
      VITE_API_BASE_URL: http://localhost:8000
    ports:
      - "5173:5173"
    depends_on:
      - backend

volumes:
  postgres_data: