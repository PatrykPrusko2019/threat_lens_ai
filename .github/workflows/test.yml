name: Tests

on:
    push: 
        branches: 
            - main
            - "feature/**"
            - "test/**"
            - "ci/**"
            - "refactor/**"
    pull_request: 
      branches:
        - main
    workflow_dispatch: 
        
jobs:
    pytest:
        name: Run pytest
        runs-on: ubuntu-latest
        
        
        services:
            postgres:
                image: postgres:16
                env:
                    POSTGRES_USER: postgres
                    POSTGRES_PASSWORD: postgres
                    POSTGRES_DB: threatlens_test
                ports:
                    - 5432:5432
                options: >-
                    --health-cmd="pg_isready -U postgres -d threatlens_test"
                    --health-interval=10s
                    --health-timeout=5s
                    --health-retries=5
                    
        env:
            TEST_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/threatlens_test
            DB_HOST: localhost
            DB_PORT: 5432
            DB_NAME: threatlens_test
            DB_USER: postgres
            DB_PASSWORD: postgres
            SECRET_KEY: test-secret-key
            ALGORITHM: HS256
            ACCESS_TOKEN_EXPIRE_MINUTES: 60
            ALERT_EXPLANATION_PROVIDER: rule_based
            OPENAI_API_KEY: ""
            OPENAI_ALERT_MODEL: gpt-4o-mini
            PYTHONPATH: .
            
        steps:
            - name: Checkout repository
              uses: actions/checkout@v4
              
            - name: Set up Python
              uses: actions/setup-python@v5
              with:
                python-version: "3.11"
                cache: "pip"
                
            - name: Install dependencies
              run: |
                python -m pip install --upgrade pip
                pip install -r requirements.txt
                
            - name: Run tests
              run: pytest -v